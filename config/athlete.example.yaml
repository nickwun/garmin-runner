# Copy this file to config/athlete.yaml and keep the copy out of Git.
athlete:
  name: "Your Name"
  timezone: "Asia/Shanghai"

garmin:
  # Prefer environment variables in .env:
  # GARMIN_EMAIL=you@example.com
  # GARMIN_PASSWORD=your-password
  email_env: "GARMIN_EMAIL"
  password_env: "GARMIN_PASSWORD"
  token_store: "data/tokens"
  # 中国区 Garmin Connect 用户使用 true（https://connect.garmin.cn/）。
  is_cn: false

storage:
  data_dir: "data"
  database_path: "data/garmin-runner.sqlite"
  summary_dir: "data/raw/summary"
  fit_dir: "data/raw/fit"
  reports_dir: "reports"

training:
  # 按你的个人情况填写。第一版规则引擎只使用这些确定性区间，不调用 LLM。
  heart_rate_zones:
    recovery_low: 120
    recovery_high: 135
    easy_low: 133
    easy_high: 145
    aerobic_high: 155
    steady_high: 165
    mp_bridge_high: 170
    threshold_high: 178
    vo2_high: 188
    sprint_high: 194
  long_run_min_distance_km: 18
  long_run_min_duration_min: 90
  weekly_structure:
    rest_day: "monday"
    normal_volume_min_km: 100
    normal_volume_max_km: 120
    tuesday_quality: true
    friday_steady: true
    weekend_long_run: true
    marathon_goal: "年底 2:45 全马目标"
    b_race_note: "东营作为 B 赛测试，不全力"
